name: Deploy a producción

# Auto-sync: cada push a main aplica migraciones de Supabase, builda la imagen
# en GHCR y el servidor solo hace `docker pull` + restart (~30s).
#
# Secrets necesarios (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN              token personal de Supabase
#   SUPABASE_PROJECT_REF               ref del proyecto (xxxx en xxxx.supabase.co)
#   SUPABASE_DB_PASSWORD               password de la base
#   LIGHTSAIL_HOST / LIGHTSAIL_USER    IP/host y usuario SSH
#   LIGHTSAIL_SSH_KEY                  clave SSH privada
#   NEXT_PUBLIC_SUPABASE_URL           públicas — horneadas en el bundle del cliente
#   NEXT_PUBLIC_SUPABASE_ANON_KEY      (no son secretas; van como build args)
#   NEXT_PUBLIC_BASE_DOMAIN
#   NEXT_PUBLIC_ROOT_URL

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/crm-creativia

jobs:
  migrate:
    name: Migraciones Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 1.226.4
      - name: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

  build:
    name: Build & push imagen (GHCR)
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        # GHCR exige el repo owner en minúsculas. Lo normalizamos por si la org
        # tiene mayúsculas en el slug.
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BASE_DOMAIN=${{ secrets.NEXT_PUBLIC_BASE_DOMAIN }}
            NEXT_PUBLIC_ROOT_URL=${{ secrets.NEXT_PUBLIC_ROOT_URL }}
            NEXT_PUBLIC_DEFAULT_LOCALE=es
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

  deploy:
    name: Redeploy servidor (pull GHCR)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH → pull & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/CRM-Creativia
            # docker-compose.yml ya apunta a ghcr.io/.../crm-creativia:latest
            git fetch origin
            git reset --hard origin/main
            docker compose pull
            # --wait: docker compose espera a que el container quede healthy
            # antes de cortar el reemplazo. --wait-timeout 90s da margen al
            # build de Next; --remove-orphans limpia restos viejos.
            docker compose up -d --wait --wait-timeout 90 --remove-orphans
            docker image prune -f
            docker compose ps
