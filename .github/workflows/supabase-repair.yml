name: Supabase migration repair (one-off)

# Sincroniza el historial de migraciones de Supabase Cloud con el repo, marcando
# como "applied" las migraciones que ya corriste a mano. Después de correrlo,
# `supabase db push` ya no intentará re-aplicarlas y el deploy normal funciona.
#
# Cuándo correrlo:
#   - La PRIMERA vez (porque venías aplicando migraciones a mano).
#   - Cada vez que agregues una migración a mano por fuera del CI.
#
# Solo se dispara a mano: Actions → Supabase migration repair → Run workflow.

on:
  workflow_dispatch: {}

concurrency:
  group: supabase-repair
  cancel-in-progress: false

jobs:
  repair:
    name: Marcar migraciones como aplicadas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 1.226.4

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Diff local vs remoto + repair de las que falten
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          local_v=$(ls supabase/migrations/ | grep -E '^[0-9]+_' | sed -E 's/_.*//' | sort -u)
          # `migration list` imprime una tabla; la columna "Remote" trae la
          # versión registrada en supabase_migrations.schema_migrations. Las
          # filas con Remote vacío son las que faltan registrar.
          list_out=$(supabase migration list --password "$DB_PASS" 2>&1)
          echo "$list_out"
          remote_v=$(echo "$list_out" | awk -F'│' 'NR>2 && $3 ~ /[0-9]/ { gsub(/ /,"",$3); if($3!="") print $3 }' | sort -u)

          echo
          echo "Local : $(echo "$local_v" | wc -l) versiones"
          echo "Remoto: $(echo "$remote_v" | wc -l) versiones"

          missing=$(comm -23 <(echo "$local_v") <(echo "$remote_v"))
          if [ -z "$missing" ]; then
            echo
            echo "✓ Nada que reparar: historial remoto ya tiene todas las versiones locales."
            exit 0
          fi

          echo
          echo "Versiones a marcar como applied:"
          echo "$missing" | sed 's/^/  - /'
          echo
          fail=0
          for v in $missing; do
            echo "→ repair $v"
            if ! supabase migration repair --status applied "$v" --password "$DB_PASS"; then
              echo "✗ falló $v"
              fail=$((fail+1))
            fi
          done
          if [ $fail -gt 0 ]; then
            echo "Repair terminó con $fail fallos."
            exit 1
          fi
          echo "✓ Todas las versiones faltantes marcadas como applied."
