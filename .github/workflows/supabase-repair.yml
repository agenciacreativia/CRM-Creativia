name: Supabase migration repair (one-off)

# Sincroniza el historial de migraciones de Supabase Cloud con el repo, marcando
# como "applied" las migraciones que ya corriste a mano. Después de correrlo,
# `supabase db push` ya no intentará re-aplicarlas y el deploy normal funciona.
#
# Cuándo correrlo:
#   - La PRIMERA vez (porque venías aplicando migraciones a mano).
#   - Cada vez que agregues una migración a mano por fuera del CI.
#
# Solo se dispara a mano: Actions → Supabase migration repair → Run workflow.

on:
  workflow_dispatch: {}

concurrency:
  group: supabase-repair
  cancel-in-progress: false

jobs:
  repair:
    name: Marcar migraciones como aplicadas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 1.226.4

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Estado remoto (informativo)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase migration list --password "${{ secrets.SUPABASE_DB_PASSWORD }}" || true

      - name: Repair (ya-registrada cuenta como éxito)
        # bash sin -e: el loop maneja errores explícitamente con $?.
        # Con -e (default de Actions), un repair fallido mataría el script
        # antes de poder evaluar el código de salida.
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASS: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set +e
          versions=$(ls supabase/migrations/ | grep -E '^[0-9]+_' | sed -E 's/_.*//' | sort -u)
          if [ -z "$versions" ]; then
            echo "Sin migraciones en supabase/migrations/"; exit 0
          fi
          ok=0; already=0; fail=0
          for v in $versions; do
            out=$(supabase migration repair --status applied "$v" --password "$DB_PASS" 2>&1)
            code=$?
            if [ $code -eq 0 ]; then
              echo "✓ $v (registrada)"; ok=$((ok+1))
            elif echo "$out" | grep -q "duplicate key"; then
              echo "✓ $v (ya estaba)"; already=$((already+1))
            else
              echo "✗ $v"
              echo "$out" | sed 's/^/    /'
              fail=$((fail+1))
            fi
          done
          echo
          echo "Resumen: $ok nuevas, $already ya estaban, $fail fallos."
          [ $fail -eq 0 ]
