# Supabase local development config.
# Used by `supabase` CLI commands. Most settings only affect `supabase start`
# (local Docker stack). For Cloud, configure via the dashboard.

project_id = "crm-turistea"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://acme.localhost:3000/auth/callback",
  "http://globex.localhost:3000/auth/callback"
]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[storage]
enabled = true
file_size_limit = "50MiB"
