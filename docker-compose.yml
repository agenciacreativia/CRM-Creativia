# CRM Turistea — PROD: usa la imagen pre-buildeada en GHCR por CI.
# El servidor solo hace `docker compose pull && docker compose up -d`.
#
# Para buildear LOCAL en tu PC (cuando querés probar cambios sin pasar por CI):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build

services:
  crm:
    image: ghcr.io/agenciacreativia/crm-creativia:latest
    container_name: turistea-crm
    restart: unless-stopped
    env_file:
      - .env # secretos de runtime (SERVICE_ROLE, OAuth, CUPOS, etc.)
    ports:
      - "3000:3000"
    pull_policy: always
